<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker || Home</title>
    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/fav.jpg" type="image/x-icon">
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- style file -->
     <link rel="stylesheet" href="style.css">
    <!-- daisy ui & tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#f8fafc] min-h-screen">
    <!-- navigation section -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-3 flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="flex items-center gap-3">
                <img class="w-8 h-8" src="./assets/github-logo.png" alt="">
                <h2 class="text-lg font-semibold text-gray-800">
                    GitHub Issues Tracker
                </h2>
            </div>

            <div class="w-full md:w-80">
                <label class="input input-primary flex items-center gap-2 pr-0 w-full">
                    <svg class="h-4 opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                    </g>
                    </svg>
                    <input id="search-input" type="search" placeholder="Search issues..." class="grow pl-1" />
                    <button id="search-btn" class="btn btn-primary h-full rounded-l-none">Search</button>
                </label>
            </div>
        </div>
    </nav>

    <!-- filter btns section -->
    <section class="max-w-5xl mx-auto mt-8 px-6">
        <div class="bg-white shadow-sm rounded-xl p-4">
            <div class="grid grid-cols-3 gap-3 w-full md:w-80">
                <button id="btn-all" onclick="switchTab('all')" class="btn btn-outline px-3 bg-indigo-600 text-white ">All</button>
                <button id="btn-open" onclick="switchTab('open')" class="btn btn-outline bg-white text-gray-600">Open</button>
                <button id="btn-closed" onclick="switchTab('closed')" class="btn btn-outline bg-white text-gray-600">Closed</button>
            </div>
        </div>
    </section>

    <!-- issues section -->
    <section class="max-w-5xl mx-auto mt-6 px-4 sm:px-6">
        <!-- top part -->
        <div class="border border-gray-200 rounded-xl overflow-hidden shadow-sm">
            <div class="bg-white border-b border-gray-200 p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3 text-center md:text-left flex-col md:flex-row">
                    <div class="w-10 h-10 bg-purple-100 flex items-center justify-center rounded-full shrink-0">
                        <img src="./assets/Aperture.png" alt="Icon" class="w-6 h-6">
                    </div>
                    <div>
                        <h3 id="issue-count" class="font-bold text-lg text-gray-800">0 Issues</h3>
                        <p class="text-sm text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex items-center gap-6 text-sm font-medium">
                    <div class="flex items-center gap-2">
                        <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full"></span>
                        <span class="text-gray-700">Open</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-2.5 h-2.5 bg-purple-500 rounded-full"></span>
                        <span class="text-gray-700">Closed</span>
                    </div>
                </div>
            </div>

            <!-- spinner -->
             <div id="loading-spinner" class="hidden py-10 flex justify-center">
                <span class="loading loading-spinner text-primary"></span>
            </div>
            <!-- cards part -->
            <div id="card-container" class="p-4 sm:p-6 grid grid-cols-1 md:grid-cols-4 gap-4 overflow-y-auto max-h-[80vh]" style="background-color: #fbfbfb;">
                
            </div>
        </div>
    </section>
    <!-- modal -->
    <dialog id="issue_modal" class="modal">
        <div class="modal-box max-w-2xl p-8 rounded-2xl">
            <h3 id="modal-title" class="text-2xl font-bold text-gray-800 mb-2"></h3>
            <div class="flex items-center gap-2 mb-6">
                <span id="modal-status-badge" class="bg-emerald-500 text-white px-3 py-1 rounded-full text-xs font-bold"></span>
                <span id="modal-meta" class="text-sm text-gray-400"></span>
            </div>

            <div id="modal-labels" class="flex gap-2 mb-6"></div>

            <p id="modal-desc" class="text-gray-500 text-sm leading-relaxed mb-8"></p>

            <div class="bg-gray-50 rounded-xl p-6 grid grid-cols-2 gap-4 mb-6">
                <div>
                    <p class="text-gray-400 text-sm mb-1">Assignee:</p>
                    <p id="modal-assignee" class="font-bold text-gray-800"></p>
                </div>
                <div>
                    <p class="text-gray-400 text-sm mb-1">Priority:</p>
                    <span id="modal-priority-badge"></span>
                </div>
            </div>

            <div class="modal-action">
            <form method="dialog">
                <button class="btn bg-indigo-600 hover:bg-indigo-700 text-white px-8 rounded-lg border-none">Close</button>
            </form>
            </div>
        </div>
    </dialog>


    <script src="./scripts/home.js"></script>
</body>
</html>
